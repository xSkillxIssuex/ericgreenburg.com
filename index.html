<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Eric Greenburg — Editor / Post Lead</title>
<style>html,body{margin:0;height:100%;background:#efeae1;}</style>
<script>
  // Device router: phones/small screens get the mobile edit-map; everything else gets the desktop NLE.
  (function () {
    try {
      var w = window.innerWidth || document.documentElement.clientWidth || 0;
      var coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
      var isMobile = w < 820 || (coarse && w < 1100);
      location.replace(isMobile ? "mobile.html" : "desktop.html");
    } catch (e) {
      location.replace("desktop.html");
    }
  })();
</script>
</head>
<body></body>
</html>
